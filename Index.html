<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sopa de Letras - Verbos Irregulares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            overscroll-behavior: none; /* Prevents pull-to-refresh on mobile */
        }
        .cell {
            transition: background-color 0.1s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        .cell.highlighted {
            background-color: #dbeafe; /* Blue 100 */
            color: #1e3a8a; /* Blue 900 */
        }
        .cell.found {
            background-color: #bbf7d0; /* Green 200 */
            color: #166534; /* Green 800 */
        }
        /* Mobile specific sizing */
        @media (max-width: 640px) {
            .grid-container {
                gap: 2px;
            }
            .cell {
                width: 24px;
                height: 24px;
                font-size: 0.875rem;
            }
        }
        @media (min-width: 641px) {
            .grid-container {
                gap: 4px;
            }
            .cell {
                width: 36px;
                height: 36px;
                font-size: 1.125rem;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4">

    <!-- Header -->
    <header class="text-center mb-6 w-full max-w-4xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-2 tracking-tight">Sopa de Letras</h1>
        <p class="text-gray-500 mb-4">Verbos Irregulares en Inglés (Nivel Fácil)</p>
        
        <div class="flex justify-center items-center gap-4 bg-white py-3 px-6 rounded-2xl shadow-sm inline-flex">
            <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="timer" class="text-2xl font-mono font-semibold text-gray-800">10:00</span>
        </div>
    </header>

    <!-- Main Game Area -->
    <main class="flex flex-col md:flex-row gap-8 w-full max-w-5xl justify-center items-start">
        
        <!-- Grid Board -->
        <div class="bg-white p-4 rounded-3xl shadow-lg touch-none flex-shrink-0 mx-auto md:mx-0">
            <div id="word-grid" class="grid-container grid">
                <!-- Cells generated by JS -->
            </div>
        </div>

        <!-- Words List -->
        <div class="bg-white p-6 rounded-3xl shadow-lg w-full md:w-64 flex-shrink-0">
            <h2 class="text-lg font-semibold text-gray-800 mb-4 border-b pb-2">Palabras a buscar:</h2>
            <ul id="word-list" class="flex flex-wrap md:flex-col gap-3 md:gap-2">
                <!-- Words generated by JS -->
            </ul>
            <button id="restart-btn" class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl transition-colors hidden">
                Jugar de nuevo
            </button>
        </div>

    </main>

    <!-- Modal (Win/Lose) -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50 transition-opacity">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-95 transition-transform duration-300">
            <h2 id="modal-title" class="text-3xl font-bold mb-4">¡Ganaste!</h2>
            <p id="modal-message" class="text-gray-600 mb-8">Has encontrado todas las palabras.</p>
            <button onclick="startGame()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-xl w-full transition-colors">
                Volver a jugar
            </button>
        </div>
    </div>

    <script>
        const WORD_LIST = ["BREAK", "BRING", "BUILD", "BUY", "CATCH", "COME", "DRINK", "DRIVE", "EAT", "FALL"];
        const GRID_SIZE = 12;
        const TIME_LIMIT = 10 * 60; // 10 minutes in seconds

        let grid = [];
        let placedWords = [];
        let foundWords = [];
        let timerInterval = null;
        let timeRemaining = TIME_LIMIT;
        
        // Interaction variables
        let isSelecting = false;
        let startCell = null;
        let currentPath = [];

        const gridElement = document.getElementById('word-grid');
        const wordListElement = document.getElementById('word-list');
        const timerElement = document.getElementById('timer');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const restartBtn = document.getElementById('restart-btn');

        // Configure CSS Grid columns
        gridElement.style.gridTemplateColumns = `repeat(${GRID_SIZE}, minmax(0, 1fr))`;

        function initGrid() {
            grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(''));
            placedWords = [];
            foundWords = [];
            
            // Place words
            WORD_LIST.forEach(word => {
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 200) {
                    placed = tryPlaceWord(word);
                    attempts++;
                }
                if (placed) placedWords.push(word);
            });

            // Fill empty spaces with random letters
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === '') {
                        grid[r][c] = alphabet[Math.floor(Math.random() * alphabet.length)];
                    }
                }
            }
        }

        function tryPlaceWord(word) {
            // Directions: 0 = Horizontal (right), 1 = Vertical (down), 2 = Diagonal (down-right) - Easy Level
            const dir = Math.floor(Math.random() * 3); 
            const r = Math.floor(Math.random() * GRID_SIZE);
            const c = Math.floor(Math.random() * GRID_SIZE);

            let dr = 0, dc = 0;
            if (dir === 0) dc = 1;
            if (dir === 1) dr = 1;
            if (dir === 2) { dr = 1; dc = 1; }

            // Check bounds
            if (r + dr * word.length > GRID_SIZE || r + dr * word.length < 0) return false;
            if (c + dc * word.length > GRID_SIZE || c + dc * word.length < 0) return false;

            // Check conflicts
            for (let i = 0; i < word.length; i++) {
                const currR = r + dr * i;
                const currC = c + dc * i;
                if (grid[currR][currC] !== '' && grid[currR][currC] !== word[i]) {
                    return false;
                }
            }

            // Place word
            for (let i = 0; i < word.length; i++) {
                grid[r + dr * i][c + dc * i] = word[i];
            }
            return true;
        }

        function renderGame() {
            // Render Grid
            gridElement.innerHTML = '';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell bg-gray-100 rounded flex items-center justify-center font-bold text-gray-700 cursor-pointer';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    cell.textContent = grid[r][c];
                    gridElement.appendChild(cell);
                }
            }

            // Render Word List
            wordListElement.innerHTML = '';
            WORD_LIST.forEach(word => {
                const li = document.createElement('li');
                // Palabras en verde inicialmente
                li.className = 'font-semibold text-green-600 transition-all duration-300 bg-green-50 px-3 py-1 rounded-lg';
                li.id = `word-${word}`;
                li.textContent = word;
                wordListElement.appendChild(li);
            });
            restartBtn.classList.remove('hidden');
        }

        // Timer functions
        function startTimer() {
            clearInterval(timerInterval);
            timeRemaining = TIME_LIMIT;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                
                if (timeRemaining <= 0) {
                    endGame(false);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const s = (timeRemaining % 60).toString().padStart(2, '0');
            timerElement.textContent = `${m}:${s}`;
            
            if (timeRemaining <= 60) {
                timerElement.classList.add('text-red-500');
            } else {
                timerElement.classList.remove('text-red-500');
            }
        }

        function endGame(won) {
            clearInterval(timerInterval);
            modal.classList.remove('hidden');
            if (won) {
                modalTitle.textContent = "¡Excelente!";
                modalTitle.className = "text-3xl font-bold mb-4 text-green-600";
                modalMessage.textContent = `Has encontrado todas las palabras. Te sobraron ${Math.floor(timeRemaining / 60)}m ${timeRemaining % 60}s.`;
            } else {
                modalTitle.textContent = "¡Tiempo Terminado!";
                modalTitle.className = "text-3xl font-bold mb-4 text-red-600";
                modalMessage.textContent = "No lograste encontrar todas las palabras a tiempo. ¡Inténtalo de nuevo!";
            }
        }

        // Interaction logic (Mouse & Touch)
        function getCellFromEvent(e) {
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            const element = document.elementFromPoint(clientX, clientY);
            if (element && element.classList.contains('cell')) {
                return element;
            }
            return null;
        }

        function handleStart(e) {
            e.preventDefault(); // Prevent scrolling on touch
            const cell = getCellFromEvent(e);
            if (!cell) return;

            isSelecting = true;
            startCell = { r: parseInt(cell.dataset.r), c: parseInt(cell.dataset.c) };
            clearHighlights();
            highlightCell(startCell.r, startCell.c);
            currentPath = [startCell];
        }

        function handleMove(e) {
            if (!isSelecting) return;
            e.preventDefault();

            const cell = getCellFromEvent(e);
            if (!cell) return;

            const endCell = { r: parseInt(cell.dataset.r), c: parseInt(cell.dataset.c) };
            calculatePath(startCell, endCell);
        }

        function handleEnd(e) {
            if (!isSelecting) return;
            isSelecting = false;
            
            checkWord();
            clearHighlights();
        }

        function calculatePath(start, end) {
            clearHighlights();
            currentPath = [];
            
            const dr = Math.sign(end.r - start.r);
            const dc = Math.sign(end.c - start.c);

            // Ensure it's a straight line (horizontal, vertical, or perfectly diagonal)
            if (dr !== 0 && dc !== 0 && Math.abs(end.r - start.r) !== Math.abs(end.c - start.c)) {
                return; // Invalid path
            }

            let steps = Math.max(Math.abs(end.r - start.r), Math.abs(end.c - start.c));
            
            for (let i = 0; i <= steps; i++) {
                const r = start.r + dr * i;
                const c = start.c + dc * i;
                currentPath.push({r, c});
                highlightCell(r, c);
            }
        }

        function highlightCell(r, c) {
            const cell = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
            if (cell && !cell.classList.contains('found')) {
                cell.classList.add('highlighted');
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.cell.highlighted').forEach(cell => {
                cell.classList.remove('highlighted');
            });
        }

        function checkWord() {
            if (currentPath.length < 2) return;

            let wordStr = currentPath.map(pos => grid[pos.r][pos.c]).join('');
            let wordStrRev = wordStr.split('').reverse().join('');

            let matchedWord = null;
            if (WORD_LIST.includes(wordStr) && !foundWords.includes(wordStr)) matchedWord = wordStr;
            else if (WORD_LIST.includes(wordStrRev) && !foundWords.includes(wordStrRev)) matchedWord = wordStrRev;

            if (matchedWord) {
                // Mark cells as found
                currentPath.forEach(pos => {
                    const cell = document.querySelector(`.cell[data-r="${pos.r}"][data-c="${pos.c}"]`);
                    if (cell) {
                        cell.classList.remove('highlighted');
                        cell.classList.add('found');
                    }
                });

                // Update Word List UI: "tachadas en color rojo"
                foundWords.push(matchedWord);
                const li = document.getElementById(`word-${matchedWord}`);
                if (li) {
                    li.classList.remove('text-green-600', 'bg-green-50');
                    li.classList.add('text-red-500', 'line-through', 'bg-gray-100', 'opacity-70');
                }

                // Check Win condition
                if (foundWords.length === WORD_LIST.length) {
                    setTimeout(() => endGame(true), 300);
                }
            }
        }

        // Event Listeners
        gridElement.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);

        gridElement.addEventListener('touchstart', handleStart, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('touchend', handleEnd);

        restartBtn.addEventListener('click', startGame);

        function startGame() {
            modal.classList.add('hidden');
            initGrid();
            renderGame();
            startTimer();
        }

        // Start on load
        startGame();

    </script>
</body>
</html>
